# hermes.toml — Hermes Agent configuration
#
# This file is the durable, git-tracked configuration for the agent's runtime
# behavior. It is symlinked into $HERMES_HOME/hermes.toml (=/data/hermes,
# the persistent volume) by the bootstrap script on container start, so a
# fresh Railway deploy reconstructs the full config from the codebase.
#
# Secrets (API keys, tokens) are NOT stored here — they come from Railway
# environment variables and are read at runtime.

[provider]
# Primary provider. We route through OpenRouter (OpenAI-compatible) so the same
# OPENROUTER_API_KEY serves the main agent AND every external fleet agent (the
# runner spawns `hermes chat`, which reads this file). To go back to Nous Portal
# directly, set name="nous", base_url="https://inference-api.nousresearch.com/v1",
# api_key_env="NOUS_API_KEY", and drop the "nousresearch/" model prefixes below.
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
# API key is read from $OPENROUTER_API_KEY (set in Railway env).
api_key_env = "OPENROUTER_API_KEY"

[model]
# Default model for the main agent loop. For a strict-CoALA coding/DevOps
# agent, prefer a model with strong tool-calling, long context, and good
# instruction following. OpenRouter IDs are vendor-namespaced (swap to e.g.
# nousresearch/hermes-4-405b or anthropic/claude-* if desired).
default = "deepseek/deepseek-v4-flash"
# Subagent default — used when the main agent delegates. A smaller, faster
# model is usually fine here.
subagent = "deepseek/deepseek-v4-flash"
# Reasoning model — invoked for explicit reasoning actions (CoALA §4.4)
# when the agent self-selects extended thinking.
reasoning = "deepseek/deepseek-v4-flash"

[memory]
# Episodic + semantic substrate. SQLite + FTS5 by default; lives on the
# persistent volume so it survives redeploys. Note: hermes resolves the
# actual DB as $HERMES_HOME/state.db (HERMES_HOME=/data/hermes, the volume),
# so this path is advisory — the runtime state lives at
# /data/hermes/state.db regardless.
enabled = true
db_path = "/data/hermes/state.db"
# Auto-summarize sessions older than this into semantic claims via the
# `coala-reflection` skill.
auto_reflect_after_turns = 50

[memory.honcho]
# Dialectic user modeling — Honcho stores the agent's evolving model of the
# user. Optional; disable if not running Honcho.
enabled = false
base_url = ""

[skills]
# Skill discovery roots. The bootstrap script seeds the git-tracked skills
# into ~/.hermes/skills/ on first run; the agent may author additional
# skills there at runtime (procedural learning, CoALA §4.5).
directories = [
  "/data/hermes/skills",
  "/app/hermes-config/skills",
]
# Progressive disclosure: level-0 index always in context, level-1+ loaded
# on demand by description match.
progressive_disclosure = true

[context]
# Files always loaded into working memory at session start.
agents_md = "/app/hermes-config/AGENTS.md"
soul_md = "/app/hermes-config/SOUL.md"
# MEMORY.md, USER.md, PEERS.md live on the volume — they accumulate.
memory_md = "/data/hermes/MEMORY.md"
user_md = "/data/hermes/USER.md"
# PEERS.md is the semantic model of other agents the agent shares work
# with (see AGENTS.md §6). Loaded so the agent always knows who else is
# in the playing field.
peers_md = "/data/hermes/PEERS.md"

[tools]
# 70+ built-in tools — toolsets enabled for this agent's domain.
enabled_toolsets = [
  "filesystem",
  "shell",
  "git",
  "code-execution",
  "web-search",
  "web-fetch",
  "memory",
  "skill-manage",
  "subagent",
]

[tools.shell]
# Shell tool isolation. On Railway we run inside a container already, so a
# secondary sandbox is usually unnecessary, but command approval stays on
# for destructive ops.
require_approval_for = [
  "rm -rf",
  "git push --force",
  "git reset --hard",
  "DROP TABLE",
  "DROP DATABASE",
  "kubectl delete",
  "railway down",
]

[mcp]
# MCP server configuration is in mcp.json (loaded separately, hot-reloadable).
config_path = "/app/hermes-config/mcp.json"

# ============================================================================
# Group-agent operation — see AGENTS.md §6.
#
# Three orthogonal concepts:
#
#   [peers]       WHO is in the group (semantic registry).
#   [channels]    WHERE messages flow (channel registry with kind/etiquette).
#   [mcp]/...     HOW messages get there (transport plumbing; above).
#
# A peer can be reachable through 0..N channels via 1..N transports. The
# agent reasons over peers + channels at the cognitive layer; transports
# are invisible to the decision cycle.
# ============================================================================

[peers]
# Pointer to the agent's semantic model of known peers.
peers_md = "/data/hermes/PEERS.md"
# Each [[peers.peer]] entry registers an agent the system can collaborate
# with. Untrusted peers can still appear here — `trust` gates how seriously
# the agent weights their proposals, not whether it sees them.
#
# transport ∈ {mcp, http, webhook, shared-doc, none}
#   - mcp:        speak via an entry in mcp.json (set transport_ref to the key)
#   - http:       direct HTTP API (transport_ref = config key for endpoint/creds)
#   - webhook:    inbound-only; the peer posts to us
#   - shared-doc: no direct channel — coordination via a shared surface
#                 (e.g. a GitHub project board)
#   - none:       known to exist but currently unreachable (stub)
# trust    ∈ {untrusted, scoped, trusted}

# --- Example stubs. Uncomment + edit to register real peers. ---

# [[peers.peer]]
# id = "github-review-bot"
# display_name = "GitHub Review Bot"
# transport = "shared-doc"
# transport_ref = "github"          # the mcp.json key, even though kind=shared-doc
# capabilities = ["code-review", "ci-status"]
# trust = "scoped"
# notes = "Posts review comments on PRs. Read-only collaborator from our POV."

# [[peers.peer]]
# id = "paperclip-ai"
# display_name = "paperclip_ai coordinator"
# transport = "mcp"
# transport_ref = "paperclip_ai"    # match mcp.json key
# capabilities = ["task-routing", "agent-discovery"]
# trust = "scoped"
# notes = "Group-agent coordination platform. Stub — fill in mcp.json first."

# [[peers.peer]]
# id = "multica-swarm"
# display_name = "multica peer swarm"
# transport = "mcp"
# transport_ref = "multica"
# capabilities = ["parallel-execution", "consensus"]
# trust = "scoped"
# notes = "Multi-agent swarm. Stub."

[channels]
# Pointer to a human-readable channel registry the agent can read for
# free-form context (intended audience, recent norms, etc.). Optional.
registry_md = "/data/hermes/CHANNELS.md"

# Each [[channels.channel]] entry registers a surface the agent can
# observe or post to. Distinct from [messaging.*] below — channels are
# the cognitive abstraction the agent reasons over; messaging gateways
# are runtime plumbing for human-facing DM bots.
#
# kind       ∈ {human, peer-agent, group, broadcast}
# direction  ∈ {sync, async}
# visibility ∈ {public, private}

# --- Live: GitHub channels (transport = mcp.json:github) ---

[[channels.channel]]
id = "github-issue"
kind = "group"
direction = "async"
visibility = "public"
transport_ref = "github"
etiquette = "link-evidence,attribute-peers,no-chatter-on-closed"

[[channels.channel]]
id = "github-pr-comments"
kind = "group"
direction = "async"
visibility = "public"
transport_ref = "github"
etiquette = "one-substantive-comment,never-approve-own,link-line"

[[channels.channel]]
id = "github-project-events"
kind = "broadcast"
direction = "async"
visibility = "public"
transport_ref = "github"
etiquette = "state-change-only,no-narration"

# --- Stubs: uncomment when wiring real transports ---

# [[channels.channel]]
# id = "paperclip-coord"
# kind = "peer-agent"
# direction = "sync"
# visibility = "private"
# transport_ref = "paperclip_ai"
# etiquette = "terse,claim-on-entry"

# [[channels.channel]]
# id = "multica-broadcast"
# kind = "broadcast"
# direction = "async"
# visibility = "public"
# transport_ref = "multica"
# etiquette = "structured,one-decision-per-message"

[messaging]
# Runtime gateway plumbing for human-facing DM bots. Distinct from
# [channels] above: messaging gateways are *how Hermes accepts inbound
# messages*; channels are *what the agent reasons over* when composing
# outbound messages. They can coexist (a Telegram DM is also a channel
# with kind=human, visibility=private), but they're configured separately.
#
# Tokens come from Railway env vars.
[messaging.telegram]
enabled = false
token_env = "TELEGRAM_BOT_TOKEN"

[messaging.discord]
enabled = false
token_env = "DISCORD_BOT_TOKEN"

[messaging.slack]
enabled = false
bot_token_env = "SLACK_BOT_TOKEN"
app_token_env = "SLACK_APP_TOKEN"

[logging]
level = "info"
# Trajectory export — useful for later RL or eval work.
export_trajectories = true
trajectory_dir = "/data/hermes/trajectories"

[safety]
# Decision-cycle guardrails enforced by the runtime (not just the prompt).
max_reasoning_chain_without_grounding = 3   # CoALA §5.4 loop-back trigger
require_rollback_plan_for_destructive = true
production_writes_require_confirmation = true
